<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"
    />
    <title>Kaisen | Chat grupal maldito</title>
    <meta
      name="description"
      content="Kaisen es un chat grupal multiagente con Sukuna, Gojo, Itadori, Megumi, Todo y Mahito."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Sora:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/styles.css?v=2.0.0" />
  </head>
  <body>
    <div class="app-shell">
      <section class="chat-shell panel">
        <header class="chat-topbar">
          <div class="brand-block">
            <div class="brand-mark" aria-hidden="true"></div>
            <div class="brand-copy">
              <p class="eyebrow">Mesa maldita</p>
              <h1>Kaisen</h1>
              <p>Seis voces. Entra cuando quieras.</p>
            </div>
          </div>

          <div class="topbar-actions">
            <span id="topbar-status" class="status-chip">Mesa lista</span>
            <button id="stop-round-button" class="ghost-button" type="button" hidden>
              Cortar ronda
            </button>
          </div>
        </header>

        <div id="roster-strip" class="roster-strip" aria-label="Personajes presentes"></div>

        <main id="conversation" class="conversation" aria-live="polite"></main>
        <div id="typing-zone" class="typing-zone" aria-live="polite"></div>

        <form id="composer" class="composer">
          <label class="sr-only" for="composer-input">Escribe tu mensaje</label>
          <textarea
            id="composer-input"
            rows="1"
            maxlength="4000"
            placeholder="Habla como si entraras al grupo..."
            spellcheck="false"
          ></textarea>

          <div class="composer-footer">
            <p class="composer-hint">
              Nombralos con o sin <span>@</span> si quieres empujar la escena.
            </p>
            <button id="send-button" class="primary-button" type="submit">Enviar</button>
          </div>
        </form>
      </section>
    </div>

    <script type="module" src="/src/app.js?v=2.0.0"></script>
  </body>
</html>
